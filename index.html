<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Six Pano 360 Viewer</title>

<style>
:root{
  --panel:rgba(8,13,20,.72);
  --panel-strong:rgba(11,18,28,.88);
  --border:rgba(255,255,255,.14);
  --text:rgba(255,255,255,.96);
  --muted:rgba(255,255,255,.68);
  --accent:#38c172;
  --accent-dark:#24a35a;
  --shadow:0 18px 42px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;background:#06090d;color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif
}
#viewer{
  position:fixed;inset:0;background:#000;touch-action:none;cursor:grab
}
body.dragging #viewer{cursor:grabbing}
body.zoom-in #viewer{cursor:zoom-in}
body.zoom-out #viewer{cursor:zoom-out}
canvas{display:block;width:100%;height:100%}

.loading{
  position:fixed;inset:0;z-index:90;display:grid;place-items:center;
  background:radial-gradient(circle,rgba(35,50,70,.78),rgba(5,7,10,.98));
  font-size:15px;letter-spacing:.01em;transition:opacity .3s ease
}
.loading.hide{opacity:0;pointer-events:none}

.panel{
  position:fixed;z-index:30;background:var(--panel);border:1px solid var(--border);
  border-radius:18px;box-shadow:var(--shadow);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)
}
.title{
  top:max(18px,env(safe-area-inset-top));left:max(18px,env(safe-area-inset-left));
  width:min(390px,calc(100vw - 36px));padding:14px 16px
}
.title h1{margin:0 0 6px;font-size:16px;line-height:1.2}
.title p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}
.chip{
  display:inline-flex;margin-top:9px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.08);
  font-size:11px;font-weight:850;text-transform:uppercase;letter-spacing:.07em
}

.controls{
  left:max(18px,env(safe-area-inset-left));bottom:max(18px,env(safe-area-inset-bottom));
  display:flex;gap:8px;padding:10px
}
.ctrl{
  height:46px;min-width:46px;border:1px solid var(--border);border-radius:14px;background:rgba(8,13,20,.82);
  color:var(--text);font:inherit;font-size:18px;font-weight:850;cursor:pointer
}
.ctrl.wide{padding:0 14px;font-size:13px}
.ctrl:hover,.viewBtn:hover,.mobileBtn:hover,.hotspot:hover{background:rgba(255,255,255,.16)}

.viewBar{
  left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);
  display:flex;gap:8px;padding:10px;max-width:calc(100vw - 260px);overflow:auto
}
.viewBtn{
  appearance:none;border:1px solid var(--border);border-radius:999px;background:rgba(8,13,20,.82);
  color:var(--text);font:inherit;font-size:13px;font-weight:800;white-space:nowrap;padding:12px 14px;cursor:pointer
}
.viewBtn.active{
  background:rgba(36,163,90,.92);border-color:rgba(117,244,167,.45)
}

.hotspot{
  position:fixed;z-index:25;display:none;left:50%;top:50%;transform:translate(-50%,-50%);
  border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:12px 15px;
  background:rgba(36,163,90,.94);color:#fff;font:inherit;font-size:13px;font-weight:850;
  cursor:pointer;box-shadow:0 20px 42px rgba(0,0,0,.38);white-space:nowrap;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
}
.hotspot:before{
  content:"";position:absolute;inset:-10px;border-radius:999px;border:2px solid rgba(117,244,167,.36);
  animation:pulse 1.6s ease-out infinite;pointer-events:none
}
@keyframes pulse{from{transform:scale(.82);opacity:.85}to{transform:scale(1.28);opacity:0}}

.feedback{
  position:fixed;left:50%;bottom:max(82px,calc(env(safe-area-inset-bottom) + 82px));
  transform:translate(-50%,8px);z-index:35;padding:9px 12px;border-radius:999px;
  background:rgba(8,13,20,.78);font-size:12px;box-shadow:var(--shadow);
  opacity:0;pointer-events:none;transition:.18s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
}
.feedback.show{opacity:1;transform:translate(-50%,0)}

.mobileBtn,.mobileDrawer,.mobileClose,.mobileGrip{display:none}

@media(max-width:900px){
  .viewBar{max-width:calc(100vw - 220px)}
}
@media(max-width:760px){
  .title{display:none}
  .controls,.viewBar{display:none}

  .mobileBtn{
    display:inline-flex;position:fixed;z-index:55;right:max(12px,env(safe-area-inset-right));
    bottom:max(12px,env(safe-area-inset-bottom));border:1px solid rgba(255,255,255,.18);
    border-radius:999px;padding:13px 15px;background:rgba(8,13,20,.84);color:#fff;
    font:inherit;font-size:13px;font-weight:850;box-shadow:var(--shadow);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);cursor:pointer
  }

  .mobileDrawer{
    display:block;position:fixed;z-index:60;left:0;right:0;bottom:0;max-height:min(76vh,520px);
    overflow-y:auto;background:var(--panel-strong);border-top:1px solid var(--border);
    border-radius:24px 24px 0 0;padding:14px 16px max(18px,env(safe-area-inset-bottom));
    box-shadow:var(--shadow);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    transform:translateY(calc(100% + 18px));opacity:0;pointer-events:none;transition:.25s
  }
  body.drawer-open .mobileDrawer{transform:translateY(0);opacity:1;pointer-events:auto}
  .mobileGrip{display:block;width:46px;height:5px;border-radius:999px;margin:0 auto 12px;background:rgba(255,255,255,.26)}
  .drawerTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .drawerTop h2{margin:0;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.82)}
  .mobileClose{
    display:block;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 10px;
    background:rgba(255,255,255,.08);color:#fff;font:inherit;font-size:12px;font-weight:750;cursor:pointer
  }
  .mobileGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:14px}
  .mobileGrid .viewBtn{width:100%;border-radius:14px;padding:13px 12px;text-align:center}
  .mobileControls{display:flex;gap:8px;flex-wrap:wrap;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
  .mobileControls .ctrl.wide{flex:1 1 auto;min-width:110px}
  body.drawer-open .hotspot{display:none!important}
  .feedback{top:max(56px,calc(env(safe-area-inset-top) + 56px));bottom:auto;white-space:nowrap}
}
</style>
</head>

<body>
<div id="viewer" aria-label="Interactive 360 photosphere viewer"></div>
<div class="loading" id="loading">Loading view…</div>

<section class="panel title">
  <h1>360 Site View</h1>
  <p>Click and drag to pan. Scroll or pinch to zoom. Use the hotspots or the view bar to move between photospheres.</p>
  <div class="chip" id="viewChip">View 1</div>
</section>

<div class="panel controls">
  <button class="ctrl" id="zoomIn" type="button" aria-label="Zoom in">+</button>
  <button class="ctrl" id="zoomOut" type="button" aria-label="Zoom out">−</button>
  <button class="ctrl wide" id="reset" type="button">Reset view</button>
  <button class="ctrl wide" id="full" type="button">Full screen</button>
</div>

<nav class="panel viewBar" id="viewBar" aria-label="View selector"></nav>

<button class="mobileBtn" id="mobileBtn" type="button">Views / Controls</button>

<aside class="mobileDrawer" id="mobileDrawer" aria-label="Mobile view selector and controls">
  <div class="mobileGrip" aria-hidden="true"></div>
  <div class="drawerTop">
    <h2>Views / Controls</h2>
    <button class="mobileClose" id="mobileClose" type="button">Close</button>
  </div>
  <div class="mobileGrid" id="mobileGrid"></div>
  <div class="mobileControls">
    <button class="ctrl" id="mZoomIn" type="button" aria-label="Zoom in">+</button>
    <button class="ctrl" id="mZoomOut" type="button" aria-label="Zoom out">−</button>
    <button class="ctrl wide" id="mReset" type="button">Reset view</button>
    <button class="ctrl wide" id="mFull" type="button">Full screen</button>
  </div>
</aside>

<div id="hotspotLayer"></div>
<div class="feedback" id="feedback" aria-live="polite"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';

/*
  FILES USED BY THIS SITE
  Keep these file names in the same folder as this HTML:

  Pano 1.jpg
  Pano 2.jpg
  Pano 3.jpg
  Pano 4.jpg
  Pano 5.jpg
  Pano 6.jpg

  HOTSPOT TUNING
  The hotspot positions below are approximate, based on the uploaded photospheres.
  yaw controls left/right around the sphere.
  pitch controls up/down. Negative pitch is down toward the ground.

  To adjust a hotspot, change its yaw and pitch in the SCENES array.
*/

const SCENES = [
  {
    id:"pano1",
    name:"1",
    image:"Pano 1.jpg",
    startYaw:0,
    startPitch:0,
    startFov:80,
    hotspots:[
      {target:"pano2", label:"2", yaw:24, pitch:-33},
      {target:"pano3", label:"3", yaw:-39, pitch:-17},
      {target:"pano4", label:"4", yaw:140, pitch:-18},
      {target:"pano5", label:"5", yaw:58, pitch:-23},
      {target:"pano6", label:"6", yaw:93, pitch:-36}
    ]
  },
  {
    id:"pano2",
    name:"2",
    image:"Pano 2.jpg",
    startYaw:0,
    startPitch:0,
    startFov:80,
    hotspots:[
      {target:"pano1", label:"1", yaw:-27, pitch:-33},
      {target:"pano3", label:"3", yaw:-131, pitch:-17},
      {target:"pano4", label:"4", yaw:145, pitch:-20},
      {target:"pano5", label:"5", yaw:75, pitch:-33},
      {target:"pano6", label:"6", yaw:35, pitch:-28}
    ]
  },
  {
    id:"pano3",
    name:"3",
    image:"Pano 3.jpg",
    startYaw:0,
    startPitch:0,
    startFov:80,
    hotspots:[
      {target:"pano1", label:"1", yaw:-92, pitch:-18},
      {target:"pano2", label:"2", yaw:-39, pitch:-36},
      {target:"pano4", label:"4", yaw:128, pitch:-20},
      {target:"pano5", label:"5", yaw:82, pitch:-23},
      {target:"pano6", label:"6", yaw:49, pitch:-30}
    ]
  },
  {
    id:"pano4",
    name:"4",
    image:"Pano 4.jpg",
    startYaw:0,
    startPitch:0,
    startFov:80,
    hotspots:[
      {target:"pano1", label:"1", yaw:118, pitch:-20},
      {target:"pano2", label:"2", yaw:75, pitch:-17},
      {target:"pano3", label:"3", yaw:42, pitch:-22},
      {target:"pano5", label:"5", yaw:5, pitch:-33},
      {target:"pano6", label:"6", yaw:-48, pitch:-31}
    ]
  },
  {
    id:"pano5",
    name:"5",
    image:"Pano 5.jpg",
    startYaw:0,
    startPitch:0,
    startFov:80,
    hotspots:[
      {target:"pano1", label:"1", yaw:122, pitch:-18},
      {target:"pano2", label:"2", yaw:75, pitch:-19},
      {target:"pano3", label:"3", yaw:42, pitch:-22},
      {target:"pano4", label:"4", yaw:-119, pitch:-24},
      {target:"pano6", label:"6", yaw:5, pitch:-31}
    ]
  },
  {
    id:"pano6",
    name:"6",
    image:"Pano 6.jpg",
    startYaw:0,
    startPitch:0,
    startFov:80,
    hotspots:[
      {target:"pano1", label:"1", yaw:-136, pitch:-18},
      {target:"pano2", label:"2", yaw:-70, pitch:-20},
      {target:"pano3", label:"3", yaw:-104, pitch:-24},
      {target:"pano4", label:"4", yaw:66, pitch:-24},
      {target:"pano5", label:"5", yaw:5, pitch:-31}
    ]
  }
];

const $ = id => document.getElementById(id);
const viewer = $("viewer");
const loading = $("loading");
const viewChip = $("viewChip");
const viewBar = $("viewBar");
const mobileGrid = $("mobileGrid");
const mobileBtn = $("mobileBtn");
const mobileClose = $("mobileClose");
const hotspotLayer = $("hotspotLayer");
const feedback = $("feedback");

const zoomIn = $("zoomIn");
const zoomOut = $("zoomOut");
const reset = $("reset");
const full = $("full");
const mZoomIn = $("mZoomIn");
const mZoomOut = $("mZoomOut");
const mReset = $("mReset");
const mFull = $("mFull");

const LIMITS = {minFov:20, maxFov:105, minPitch:-85, maxPitch:85};

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(80, innerWidth / innerHeight, 1, 1100);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
viewer.appendChild(renderer.domElement);

const geometry = new THREE.SphereGeometry(500, 120, 80);
geometry.scale(-1, 1, 1);

const textureLoader = new THREE.TextureLoader();
const textureCache = new Map();

const material = new THREE.MeshBasicMaterial({color:0xffffff});
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

let currentIndex = 0;
let currentScene = SCENES[0];

let lon = currentScene.startYaw;
let lat = currentScene.startPitch;
let targetLon = lon;
let targetLat = lat;
let targetFov = currentScene.startFov;

let isDragging = false;
let isTwoFinger = false;
let pointerStartX = 0;
let pointerStartY = 0;
let pointerStartLon = 0;
let pointerStartLat = 0;
let pinchStartDistance = 0;
let pinchStartFov = targetFov;
let zoomTimer = null;
let feedbackTimer = null;
let drawerOpen = false;
let loadToken = 0;

function clamp(value, min, max){
  return Math.max(min, Math.min(max, value));
}

function sceneById(id){
  return SCENES.find(scene => scene.id === id);
}

function sceneIndexById(id){
  return SCENES.findIndex(scene => scene.id === id);
}

function showFeedback(message){
  feedback.textContent = message;
  feedback.classList.add("show");
  clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(() => feedback.classList.remove("show"), 1100);
}

function cursor(state){
  document.body.classList.remove("dragging", "zoom-in", "zoom-out");
  if(state) document.body.classList.add(state);
}

function pulseZoom(direction){
  clearTimeout(zoomTimer);
  cursor(direction === "in" ? "zoom-in" : "zoom-out");
  zoomTimer = setTimeout(() => cursor(isDragging ? "dragging" : ""), 180);
}

function setDrawer(open){
  drawerOpen = open;
  document.body.classList.toggle("drawer-open", drawerOpen);
  mobileBtn.textContent = drawerOpen ? "Close views" : "Views / Controls";
}

function loadTextureForScene(sceneConfig){
  if(textureCache.has(sceneConfig.id)){
    return Promise.resolve(textureCache.get(sceneConfig.id));
  }

  loading.textContent = `Loading view ${sceneConfig.name}…`;
  loading.classList.remove("hide");

  return new Promise((resolve, reject) => {
    textureLoader.load(
      sceneConfig.image,
      texture => {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.minFilter = THREE.LinearFilter;
        textureCache.set(sceneConfig.id, texture);
        resolve(texture);
      },
      undefined,
      error => reject(error)
    );
  });
}

function preloadConnectedScenes(){
  currentScene.hotspots.forEach(hotspot => {
    const target = sceneById(hotspot.target);
    if(target && !textureCache.has(target.id)){
      textureLoader.load(target.image, texture => {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.minFilter = THREE.LinearFilter;
        textureCache.set(target.id, texture);
      });
    }
  });
}

async function setScene(index, options = {}){
  const nextScene = SCENES[index];
  if(!nextScene) return;

  const thisLoad = ++loadToken;

  try{
    const texture = await loadTextureForScene(nextScene);
    if(thisLoad !== loadToken) return;

    material.map = texture;
    material.needsUpdate = true;

    currentIndex = index;
    currentScene = nextScene;

    targetLon = currentScene.startYaw;
    targetLat = currentScene.startPitch;
    targetFov = currentScene.startFov;

    if(options.instant){
      lon = targetLon;
      lat = targetLat;
      camera.fov = targetFov;
      camera.updateProjectionMatrix();
    }

    updateUI();
    preloadConnectedScenes();

    loading.classList.add("hide");
    if(!options.instant){
      showFeedback(`View ${currentScene.name}`);
    }
  }catch(error){
    loading.textContent = `Could not load ${nextScene.image}. Check the file is in the same folder as this page.`;
  }
}

function updateUI(){
  viewChip.textContent = `View ${currentScene.name}`;

  [...viewBar.querySelectorAll(".viewBtn"), ...mobileGrid.querySelectorAll(".viewBtn")].forEach(button => {
    button.classList.toggle("active", button.dataset.index === String(currentIndex));
  });

  hotspotLayer.innerHTML = "";

  currentScene.hotspots.forEach((hotspot, index) => {
    const button = document.createElement("button");
    button.className = "hotspot";
    button.type = "button";
    button.textContent = hotspot.label;
    button.dataset.index = String(index);
    button.addEventListener("click", () => {
      const targetIndex = sceneIndexById(hotspot.target);
      if(targetIndex >= 0){
        setScene(targetIndex);
        setDrawer(false);
      }
    });
    hotspotLayer.appendChild(button);
  });
}

function buildViewButtons(){
  SCENES.forEach((sceneConfig, index) => {
    const desktopButton = document.createElement("button");
    desktopButton.className = "viewBtn";
    desktopButton.type = "button";
    desktopButton.dataset.index = String(index);
    desktopButton.textContent = sceneConfig.name;
    desktopButton.addEventListener("click", () => setScene(index));
    viewBar.appendChild(desktopButton);

    const mobileButton = document.createElement("button");
    mobileButton.className = "viewBtn";
    mobileButton.type = "button";
    mobileButton.dataset.index = String(index);
    mobileButton.textContent = sceneConfig.name;
    mobileButton.addEventListener("click", () => {
      setScene(index);
      setDrawer(false);
    });
    mobileGrid.appendChild(mobileButton);
  });
}

function resetView(){
  targetLon = currentScene.startYaw;
  targetLat = currentScene.startPitch;
  targetFov = currentScene.startFov;
  showFeedback("View reset");
}

function adjustZoom(amount){
  targetFov = clamp(targetFov + amount, LIMITS.minFov, LIMITS.maxFov);
}

function handleWheel(event){
  event.preventDefault();
  const step = Math.sign(event.deltaY) * Math.min(4.5, Math.max(1.5, Math.abs(event.deltaY) * 0.015));
  adjustZoom(step);
  pulseZoom(step < 0 ? "in" : "out");
}

function touchDistance(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}

function getHotspotPosition(hotspot){
  const phi = THREE.MathUtils.degToRad(90 - hotspot.pitch);
  const theta = THREE.MathUtils.degToRad(hotspot.yaw);
  return new THREE.Vector3().setFromSphericalCoords(500, phi, theta);
}

function updateHotspots(){
  const buttons = hotspotLayer.querySelectorAll(".hotspot");
  buttons.forEach((button, index) => {
    const hotspot = currentScene.hotspots[index];
    if(!hotspot) return;

    const position = getHotspotPosition(hotspot);
    const projected = position.clone().project(camera);
    const inFront = position.clone().sub(camera.position).dot(camera.getWorldDirection(new THREE.Vector3())) > 0;
    const visible =
      inFront &&
      projected.x > -1.08 &&
      projected.x < 1.08 &&
      projected.y > -1.08 &&
      projected.y < 1.08;

    if(visible && !drawerOpen){
      const x = (projected.x * 0.5 + 0.5) * innerWidth;
      const y = (-projected.y * 0.5 + 0.5) * innerHeight;
      button.style.display = "block";
      button.style.left = `${x}px`;
      button.style.top = `${y}px`;
    }else{
      button.style.display = "none";
    }
  });
}

function toggleFullscreen(){
  if(document.fullscreenElement){
    document.exitFullscreen?.();
  }else{
    document.documentElement.requestFullscreen?.();
  }
}

function updateFullscreenLabels(){
  const label = document.fullscreenElement ? "Exit full screen" : "Full screen";
  full.textContent = label;
  mFull.textContent = label;
}

viewer.addEventListener("wheel", handleWheel, {passive:false});

viewer.addEventListener("pointerdown", event => {
  if(event.pointerType === "mouse" && event.button !== 0) return;
  isDragging = true;
  isTwoFinger = false;
  pointerStartX = event.clientX;
  pointerStartY = event.clientY;
  pointerStartLon = targetLon;
  pointerStartLat = targetLat;
  cursor("dragging");
  viewer.setPointerCapture?.(event.pointerId);
});

window.addEventListener("pointermove", event => {
  if(!isDragging || isTwoFinger) return;
  const deltaX = event.clientX - pointerStartX;
  const deltaY = event.clientY - pointerStartY;
  targetLon = pointerStartLon + (deltaX * 0.11);
  targetLat = clamp(pointerStartLat + (deltaY * 0.11), LIMITS.minPitch, LIMITS.maxPitch);
});

window.addEventListener("pointerup", event => {
  isDragging = false;
  isTwoFinger = false;
  cursor("");
  viewer.releasePointerCapture?.(event.pointerId);
});

viewer.addEventListener("touchstart", event => {
  if(event.touches.length === 1){
    isDragging = true;
    isTwoFinger = false;
    pointerStartX = event.touches[0].clientX;
    pointerStartY = event.touches[0].clientY;
    pointerStartLon = targetLon;
    pointerStartLat = targetLat;
    cursor("dragging");
  }else if(event.touches.length === 2){
    isDragging = false;
    isTwoFinger = true;
    pinchStartDistance = touchDistance(event.touches);
    pinchStartFov = targetFov;
  }
}, {passive:false});

viewer.addEventListener("touchmove", event => {
  event.preventDefault();

  if(event.touches.length === 1 && isDragging){
    const deltaX = event.touches[0].clientX - pointerStartX;
    const deltaY = event.touches[0].clientY - pointerStartY;
    targetLon = pointerStartLon + (deltaX * 0.11);
    targetLat = clamp(pointerStartLat + (deltaY * 0.11), LIMITS.minPitch, LIMITS.maxPitch);
  }else if(event.touches.length === 2){
    isTwoFinger = true;
    const currentDistance = touchDistance(event.touches);
    targetFov = clamp(pinchStartFov - ((currentDistance - pinchStartDistance) * 0.055), LIMITS.minFov, LIMITS.maxFov);
  }
}, {passive:false});

viewer.addEventListener("touchend", event => {
  if(event.touches.length === 0){
    isDragging = false;
    isTwoFinger = false;
    cursor("");
  }else if(event.touches.length === 1){
    isDragging = true;
    isTwoFinger = false;
    pointerStartX = event.touches[0].clientX;
    pointerStartY = event.touches[0].clientY;
    pointerStartLon = targetLon;
    pointerStartLat = targetLat;
  }
}, {passive:false});

zoomIn.addEventListener("click", () => { adjustZoom(-6); pulseZoom("in"); });
zoomOut.addEventListener("click", () => { adjustZoom(6); pulseZoom("out"); });
mZoomIn.addEventListener("click", () => { adjustZoom(-6); pulseZoom("in"); });
mZoomOut.addEventListener("click", () => { adjustZoom(6); pulseZoom("out"); });

reset.addEventListener("click", resetView);
mReset.addEventListener("click", resetView);
full.addEventListener("click", toggleFullscreen);
mFull.addEventListener("click", toggleFullscreen);
document.addEventListener("fullscreenchange", updateFullscreenLabels);

mobileBtn.addEventListener("click", () => setDrawer(!drawerOpen));
mobileClose.addEventListener("click", () => setDrawer(false));

document.addEventListener("keydown", event => {
  if(event.key === "Escape") setDrawer(false);
});

window.addEventListener("blur", () => {
  isDragging = false;
  isTwoFinger = false;
  cursor("");
});

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
});

function animate(){
  requestAnimationFrame(animate);

  lon += (targetLon - lon) * 0.12;
  lat += (targetLat - lat) * 0.12;
  camera.fov += (targetFov - camera.fov) * 0.14;
  camera.updateProjectionMatrix();

  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);
  const target = new THREE.Vector3().setFromSphericalCoords(500, phi, theta);
  camera.lookAt(target);

  updateHotspots();
  renderer.render(scene, camera);
}

buildViewButtons();
updateFullscreenLabels();
setScene(0, {instant:true});
animate();
</script>
</body>
</html>
